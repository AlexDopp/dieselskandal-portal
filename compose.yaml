services:
  db:
    image: postgres:17
    container_name: dieselskandal_db
    environment:
      POSTGRES_DB: dieselskandal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: alexdopp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  webapp_dieselskandal:
    image: webapp_dieselskandal
    build:
      context: .
      dockerfile: Webapp_Dieselskandal/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=dieselskandal_db;Username=postgres;Password=alexdopp
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - webapp_dieselskandal

volumes:
  postgres_data:
